pluginManagement {
    repositories {
        gradlePluginPortal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

// The prerequisite mod, built from the sibling directory rather than a published jar.
// A change there is visible here on the next build -- no publish step to forget.
includeBuild '../customplayer-template-1.21.1'
