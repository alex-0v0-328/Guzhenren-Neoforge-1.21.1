name: Build

on: [push, pull_request]

# Both repositories are checked out as SIBLINGS inside the workspace, because settings.gradle
# reaches for the prerequisite mod at '../customplayer-template-1.21.1'. actions/checkout refuses
# a path outside the workspace, so neither repo may sit at the workspace root.
# The checkout paths are the LOCAL directory names, not the repository names.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: guzhenren-template-1.21.1
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout the prerequisite mod
        uses: actions/checkout@v4
        with:
          repository: alex-0v0-328/CustomPlayer-Neoforge-1.21.1
          path: customplayer-template-1.21.1

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        working-directory: guzhenren-template-1.21.1
        run: chmod +x ./gradlew ../customplayer-template-1.21.1/gradlew

      - name: Build with Gradle
        working-directory: guzhenren-template-1.21.1
        run: ./gradlew build
